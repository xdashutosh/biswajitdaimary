<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9933"/>
      <stop offset="100%" style="stop-color:#e8850a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#shine)"/>
  <!-- B letter -->
  <text x="135" y="355" font-family="Georgia, 'Times New Roman', serif" font-size="300" font-weight="bold" fill="#FFFFFF" letter-spacing="-15">B</text>
  <!-- D letter, slightly overlapping -->
  <text x="280" y="355" font-family="Georgia, 'Times New Roman', serif" font-size="300" font-weight="bold" fill="rgba(255,255,255,0.85)" letter-spacing="-15">D</text>
  <!-- Bottom accent line -->
  <rect x="120" y="400" width="272" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
</svg>
